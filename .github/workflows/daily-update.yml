name: Daily AI News Update

on:
  schedule:
    - cron: '0 22 * * *'   # 毎日 22:00 UTC = 翌 07:00 JST に自動実行
  workflow_dispatch:        # GitHub画面から手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # コミット・プッシュに必要

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install tweepy

      - name: Generate AI News site
        env:
          GEMINI_API_KEY:                ${{ secrets.GEMINI_API_KEY }}
          TWITTER_API_KEY:               ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:            ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:          ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET:   ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: python3 scripts/generate_website.py --force

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "No changes" || git commit -m "Auto update: $(date '+%Y-%m-%d')"
          git push
